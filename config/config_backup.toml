[app]
name = "AutoPaper"
timezone = "Asia/Shanghai"
language = "zh-CN"

[paths]
tasks_dir = "tasks"
download_dir = "download"
logs_dir = "logs"
statistic_file = "statistic.csv"

[pubmed]
rss_max_items = 15

[download]
headless = false
timeout_sec = 60
retry_times = 3
retry_interval_sec = 3

[login]
zju_username = false
zju_password = true

[gui]
page_size = 20
auto_refresh_sec = 0
theme = "light"

[browser]
launch_wait_sec = 3
action_interval_sec = 0.2
